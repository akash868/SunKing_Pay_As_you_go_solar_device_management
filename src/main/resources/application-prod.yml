# ================================
# PRODUCTION Profile
# Uses real PostgreSQL
# ================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/paygdb}
    username: ${DB_USERNAME:payguser}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.sunking.payg: INFO
    org.hibernate.SQL: WARN

integration:
  mobile-money:
    mock-enabled: ${MOBILE_MONEY_MOCK:false}
    success-rate: 1.0
